<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Elite Tactical Headwear | Luxury Military Caps</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HERO -->
  <section class="hero">

    <div class="hero-bg"></div>

    <div class="hero-grid">

      <div class="hero-left">
        <div class="script">Elite Division</div>

        <h1 class="typing">
          <span id="typed"></span>
        </h1>

        <p>
          Tactical luxury engineered for identity, dominance, and elite presence in modern street warfare aesthetics.
        </p>

        <button onclick="scrollToSection('collection')">Explore Arsenal</button>
      </div>

      <div class="hero-right">
        <div class="hero-card"></div>
        <div class="hero-card"></div>
        <div class="hero-card"></div>
      </div>

    </div>
  </section>

  <!-- VIDEO -->
  <section class="video-section">
    <video autoplay muted loop>
      <source src="https://cdn.coverr.co/videos/coverr-soldiers-walking-4556/1080p.mp4" type="video/mp4">
    </video>

    <div class="video-overlay">
      <h2 class="animated-text">ENGINEERED FOR OPERATORS. BUILT FOR STYLE.</h2>
    </div>
  </section>

  <!-- COLLECTION -->
  <section class="collection" id="collection">
    <h2>Elite Collection</h2>

    <div class="grid">
      <div class="card">Shadow Operator Cap</div>
      <div class="card">Desert Recon Hat</div>
      <div class="card">Urban Tactical Beret</div>
      <div class="card">Field Commander</div>
      <div class="card">Stealth Patrol</div>
      <div class="card">Night Recon</div>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
